<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a2e;
      background: #f8f9fa;
    }
    .header {
      background: #2d3748;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 { font-size: 14px; font-weight: 600; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block;
    }
    .status-dot.online { background: #48bb78; }
    .status-dot.offline { background: #fc8181; }
    .content { padding: 12px 16px; }
    .section { margin-bottom: 12px; }
    .section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #718096;
      margin-bottom: 4px;
    }
    select, button, input[type="file"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      background: white;
    }
    select:focus, button:focus { outline: 2px solid #4299e1; border-color: transparent; }
    .btn-primary {
      background: #4299e1;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      padding: 10px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #3182ce; }
    .btn-primary:disabled { background: #a0aec0; cursor: not-allowed; }
    .btn-secondary {
      background: white;
      color: #4a5568;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
    }
    .btn-secondary:hover { background: #edf2f7; }
    .results { margin-top: 12px; }
    .result-item {
      padding: 6px 8px;
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 12px;
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }
    .result-error { background: #fff5f5; border-left: 3px solid #e53e3e; }
    .result-warning { background: #fffff0; border-left: 3px solid #d69e2e; }
    .result-match { background: #f0fff4; border-left: 3px solid #38a169; }
    .result-icon { flex-shrink: 0; }
    .summary {
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
    }
    .summary-good { background: #c6f6d5; color: #276749; }
    .summary-bad { background: #fed7d7; color: #9b2c2c; }
    .error-msg {
      background: #fff5f5;
      color: #c53030;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 8px;
    }
    .hidden { display: none; }
    .footer {
      padding: 8px 16px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="status-dot" id="statusDot"></span>
    <h1>Visa Form Checker</h1>
  </div>

  <div class="content">
    <div id="offlineMsg" class="error-msg hidden">
      Backend is not running. Start it with: <code>./scripts/start.sh</code>
    </div>

    <div id="mainContent">
      <div class="section">
        <label>Profile</label>
        <select id="profileSelect">
          <option value="">Loading...</option>
        </select>
      </div>

      <div class="section">
        <button class="btn-primary" id="checkBtn" disabled>Check This Page</button>
      </div>

      <div id="results" class="results hidden"></div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-secondary" id="clearBtn" style="flex:1">Clear Highlights</button>
    <button class="btn-secondary" id="optionsBtn" style="flex:1">Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
